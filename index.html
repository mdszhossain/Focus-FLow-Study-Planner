<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
         
        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
        <!-- Fontawesome CDN -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <!-- Tailwind -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- Raw CSS -->
        <link rel="stylesheet" href="./styles/style.css">
        <!-- Webpage Title -->
        <title>Focus-Flow | Plan-Study</title>
    </head>
    <body>
        <header id="header-container"></header>
        <main>
            <section class="main-box w-11/12 xl:w-8/12 rounded-2xl m-auto mt-10">
                <!-- Progress Bar Container Top -->
                <div class="w-full">
                    <div class="progress-bar-container w-full">
                        <div>Progress</div>
                        <div><span>0</span> / <span class="complete-num">0</span> <span>completed</span></div>
                    </div>
                </div>
                
                <!-- Progress Bar -->
                <div class="progress-bar-wrapper w-full bg-gray-200 rounded-full h-3 mt-3 overflow-hidden">
                    <div class="progress-bar-fill h-full bg-blue-600 rounded-full" style="width: 100%"></div>
                </div>

                <div class="text-md mt-5">Select Subject</div>

                <!-- Subject box container -->
                <section class="subject-container pt-4 gap-2 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6"></section>

                <!-- Task Input Field and Add Task Button -->
                <section class="task-input flex flex-col sm:flex-row md:items-center gap-5 mt-10 mb-10"></section>

                <!-- No Task Space -->
                <div class="no-task-space text-center"></div>

                <!-- Task List -->
                <section class="task-list"></section>
            </section>
        </main>
        <footer></footer>

        <!-- script -->
        <script src="scripts/app.js"></script>
    </body>
</html>
